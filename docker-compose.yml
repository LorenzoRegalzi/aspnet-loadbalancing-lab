services:
  app1:
    build:
      context: .
    expose:
      - "8080"

  app2:
    build:
      context: .
    expose:
      - "8080"

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - app1
      - app2
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
